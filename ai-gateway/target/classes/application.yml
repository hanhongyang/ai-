server:
  port: 8080

spring:
  application:
    name: ai-gateway
  datasource:
#    url: jdbc:mysql://localhost:3306/ai_gateway?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
#    username: root
#    password: root
#    driver-class-name: com.mysql.cj.jdbc.Driver
     url: jdbc:h2:file:./mydb;MODE=MySQL;AUTO_RECONNECT=TRUE
     driver-class-name: org.h2.Driver
     username: sa
     password:
  h2:
    console:
      # 开启浏览器可视化控制台
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

dingtalk:
  stream:
    client-id: ${DINGTALK_CLIENT_ID:}
    client-secret: ${DINGTALK_CLIENT_SECRET:}
  robot:
    max-question-length: 500
    enable-at-check: true
    fallback-answer: "抱歉，AI 助手暂时无法回答，请稍后再试。"

fastgpt:
  base-url: ${FASTGPT_BASE_URL:https://your-fastgpt-domain}
  api-key: ${FASTGPT_API_KEY:}
  timeout-seconds: 30

logging:
  level:
    root: info
    com.example.aigateway: debug
